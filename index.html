<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LabSim</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <div id="error-log" style="color: red; padding: 20px; font-family: monospace; white-space: pre-wrap; z-index: 9999; position: relative;"></div>
    <script>
      window.addEventListener('error', function(event) {
        document.getElementById('error-log').textContent += '\nError: ' + event.message + ' at ' + event.filename + ':' + event.lineno;
      });
      window.addEventListener('unhandledrejection', function(event) {
        document.getElementById('error-log').textContent += '\nPromise Rejection: ' + (event.reason && event.reason.message || event.reason);
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
